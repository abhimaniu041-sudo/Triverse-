name: triverse
description: TriVerse - Premium AI Creation Hub (Brahma / Vishnu / Shiva)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.2
  firebase_auth: ^4.13.2
  cloud_firestore: ^4.13.3
  cloud_functions: ^4.5.2
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.10
  google_generative_ai: ^0.4.0
  lottie: ^3.0.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  archive: ^3.3.7
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  url_launcher: ^6.2.4
  razorpay_flutter: ^1.3.7
  fl_chart: ^0.66.2
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
