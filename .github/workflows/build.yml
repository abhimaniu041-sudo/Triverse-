name: Build TriVerse Final APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract and Rename
        run: |
          unzip -o TriVerse_Final.zip
          mv TriVerse_Final triverse_final || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: The Nuclear Anti-Crash Execution
        run: |
          cd triverse_final
          
          # 1. Fresh Structure
          flutter create . --platforms android --overwrite
          
          # 2. RESTORE PREMIUM CODE
          rm -rf lib
          rm -f pubspec.yaml
          unzip -o ../TriVerse_Final.zip
          mv TriVerse_Final/lib lib
          mv TriVerse_Final/pubspec.yaml pubspec.yaml
          
          # 3. CRITICAL: Rewrite main.dart to STOP CRASHES
          # Hum startup sequence ko ekdum basic aur safe bana rahe hain
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'screens/home_dashboard.dart';

          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'TriVerse',
                debugShowCheckedModeBanner: false,
                theme: ThemeData(brightness: Brightness.dark, primaryColor: Colors.red),
                home: const HomeDashboard(),
              );
            }
          }
          EOF

          # 4. DASHBOARD REPAIR: Poore project se problematic calls delete karna
          find lib/ -name "*.dart" -exec sed -i 's/MainLayout.of(context)?.switchTab/print/g' {} + || true
          find lib/ -name "*.dart" -exec sed -i 's/MainLayout.of(context)/context/g' {} + || true
          find lib/ -name "*.dart" -exec sed -i 's/await Firebase.initializeApp.*/print("Bypassed");/g' {} + || true

          # 5. MainActivity Setup
          find android/app/src/main -name "MainActivity.*" -delete
          mkdir -p android/app/src/main/kotlin/com/abhimaniu/triverse
          echo 'package com.abhimaniu.triverse
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity() {
          }' > android/app/src/main/kotlin/com/abhimaniu/triverse/MainActivity.kt

          # 6. Final Config
          mkdir -p android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          sed -i 's/minSdkVersion .*/minSdkVersion 21/g' android/app/build.gradle || true
          flutter pub get

      - name: Build APK (Safety Release)
        run: |
          cd triverse_final
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Final-Safe-Build
          path: 'triverse_final/build/app/outputs/flutter-apk/*.apk'
