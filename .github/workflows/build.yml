name: Build TriVerse Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip -o TriVerse_Final.zip

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '2.10.5' # Purana version jo v1 embedding support karta hai

      - name: Create google-services.json
        run: |
          mkdir -p TriVerse_Final/android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > TriVerse_Final/android/app/google-services.json

      - name: Install Dependencies
        working-directory: ./TriVerse_Final
        run: flutter pub get

      - name: Build APK
        working-directory: ./TriVerse_Final
        run: flutter build apk --release --no-sound-null-safety

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: triverse-release-apk
          path: TriVerse_Final/build/app/outputs/flutter-apk/app-release.apk
