name: Build TriVerse Final APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4

      # 2. Setup Java
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Setup Flutter
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      # 4. Extract project
      - name: Extract Project
        run: |
          unzip -o TriVerse_Final.zip -d project

      # 5. Move into project
      - name: Enter Project
        run: |
          cd project/TriVerse_Final
          ls

      # 6. Install dependencies
      - name: Get Dependencies
        run: |
          cd project/TriVerse_Final
          flutter pub get

      # 7. Build APK
      - name: Build APK
        run: |
          cd project/TriVerse_Final
          flutter build apk --release

      # 8. Upload APK
      - uses: actions/upload-artifact@v4
        with:
          name: triverse-apk
          path: project/TriVerse_Final/build/app/outputs/flutter-apk/app-release.apk
