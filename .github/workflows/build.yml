name: Build TriVerse Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract ZIP
        run: unzip -o TriVerse_Final.zip

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Firebase & Code Sync
        run: |
          mv TriVerse_Final triverse_final || true
          cd triverse_final
          
          # Fresh Android setup but KEEPING original files
          flutter create . --platforms android --overwrite
          
          # Firebase Secret Setup
          mkdir -p android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          
          # Force copy to build directory
          cp android/app/google-services.json build/app/ || true

          # MainLayout Fix (Pichli baar wala logic)
          sed -i 's/MainLayout.of(context)?.switchTab/print/g' lib/screens/home_dashboard.dart || true

          flutter pub get

      - name: Build APK
        run: |
          cd triverse_final
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Firebase-Fixed
          path: 'triverse_final/build/app/outputs/flutter-apk/*.apk'
