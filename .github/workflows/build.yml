name: Build TriVerse Final Premium

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Manual Force Repair
        run: |
          # 1. Framework Fresh Start
          flutter create . --platforms android --overwrite --project-name triverse_app
          
          # 2. Extract Premium Code
          unzip -o triverse_final.zip
          
          # 3. FORCE SETTINGS.GRADLE (The Fix for 'org.jetbrains.kotlin.android')
          cat <<EOF > android/settings.gradle
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }()
              includeBuild("\$flutterSdkPath/packages/flutter_tools/gradle")
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          plugins {
              id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
              id "com.android.application" version "8.1.0" apply false
              id "org.jetbrains.kotlin.android" version "1.9.10" apply false
              id "com.google.gms.google-services" version "4.3.15" apply false
          }
          include ":app"
          EOF

          # 4. Add Essential Packages
          flutter pub add provider razorpay_flutter firebase_core firebase_auth cloud_functions

      - name: Final Build
        run: |
          flutter pub get
          cd android && ./gradlew clean && cd ..
          flutter build apk --release --no-tree-shake-icons
