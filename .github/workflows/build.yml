name: Build TriVerse Final

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Force Code Overwrite
        run: |
          # 1. Framework & Cleanup
          flutter create . --platforms android --overwrite --project-name triverse_app
          rm -rf lib/*
          
          # 2. Extract & Manually Move Files (Anti-Demo Logic)
          unzip -o triverse_final.zip
          # Agar zip ke andar lib folder hai toh use root lib mein copy karo
          find . -type d -name "lib" -exec cp -r {}/. lib/ \;
          
          # 3. Fix Libraries (Jo screenshot mein error the)
          flutter pub add razorpay_flutter firebase_core firebase_auth cloud_functions provider
          flutter pub get

          # 4. Java-Based Android Fix (Stable Method)
          rm -rf android/app/src/main/kotlin
          mkdir -p android/app/src/main/java/com/example/triverse_app/
          cat <<EOF > android/app/src/main/java/com/example/triverse_app/MainActivity.java
          package com.example.triverse_app;
          import io.flutter.embedding.android.FlutterActivity;
          public class MainActivity extends FlutterActivity {}
          EOF

      - name: Final Build
        run: |
          cd android && ./gradlew clean && cd ..
          flutter build apk --release --no-tree-shake-icons

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Real-APK
          path: build/app/outputs/flutter-apk/*.apk
