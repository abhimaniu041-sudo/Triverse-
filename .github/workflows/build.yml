name: TriVerse - The Final Victory Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 🛠️ SCRAP OLD & REBUILD NEW
        run: |
          # 1. Folders Setup
          mkdir -p lib/services
          mkdir -p android/app/src/main/kotlin/com/example/triverse

          # 2. Move files to lib
          mv *.dart lib/ 2>/dev/null || true
          mv lib/*.dart lib/ 2>/dev/null || true # In case they are already there
          mv lib/support_chat_service.dart lib/services/ 2>/dev/null || true
          mv lib/gemini_service.dart lib/services/ 2>/dev/null || true

          # 3. FORCE DELETE OLD ANDROID CONFIGS (The Fix)
          # Hum purane kachre ko delete kar rahe hain jo V1 embedding ka error de raha hai
          rm -f android/app/src/main/kotlin/com/example/triverse/MainActivity.kt 2>/dev/null || true
          
          # 4. WRITE FRESH V2 MAINACTIVITY
          echo "package com.example.triverse
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity() {}" > android/app/src/main/kotlin/com/example/triverse/MainActivity.kt

          # 5. FORCE PATCH MANIFEST (Strict Version)
          # Purani lines ko hatane ka sabse pakka tarika
          if [ -f AndroidManifest.xml ]; then
            mv AndroidManifest.xml android/app/src/main/ 2>/dev/null || true
          fi
          sed -i 's/io.flutter.app.FlutterApplication/${applicationName}/g' android/app/src/main/AndroidManifest.xml || true
          
          # Audioplayers fix: Force modern Android embedding
          echo 'flutter.minSdkVersion=21' > android/local.properties
          echo 'flutter.targetSdkVersion=34' >> android/local.properties

      - name: 🚀 Setup Flutter (Stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: 🏗️ Final Build Effort
        run: |
          flutter pub upgrade --major-versions # Purani plugins (audio) ko force upgrade karo
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: 📦 Download Link
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-SUCCESS-APK
          path: build/app/outputs/flutter-apk/app-release.apk
