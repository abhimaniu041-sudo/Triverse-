name: Scan and Build TriVerse

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip -o TriVerse_Final.zip

      - name: Scan Files
        run: |
          echo "--- Listing all files to find gradlew ---"
          find . -maxdepth 4 -name "*"
          
      - name: Build Android APK
        run: |
          # Dhoondo ki gradlew file hai bhi ya nahi
          GRADLE_FILE=$(find . -name "gradlew" | head -n 1)
          if [ -z "$GRADLE_FILE" ]; then
            echo "Bhai, gradlew file nahi mili! Kya ZIP ke andar android folder hai?"
            ls -R
            exit 1
          fi
          GRADLE_DIR=$(dirname "$GRADLE_FILE")
          cd "$GRADLE_DIR"
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: triverse-release-apk
          path: "**/build/outputs/apk/release/*.apk"
