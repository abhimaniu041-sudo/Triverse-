name: Build TriVerse Premium APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Sabse pehle Java aur Flutter setup karo (Zaruri!)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      # 2. Ab Framework aur Extraction ka kaam ek saath karo
      - name: Create Framework & Inject Premium Code
        run: |
          # Framework banao
          flutter create triverse_app --platforms android --project-name triverse_app
          
          # Aapka repaired code extract karo
          unzip -o triverse_final.zip -d temp_folder
          
          # Demo 'lib' hatao aur MT Manager wala 'lib' dalo
          rm -rf triverse_app/lib
          
          # Sahi folder dhoond kar copy karo
          if [ -d "temp_folder/triverse_final/lib" ]; then
            cp -r temp_folder/triverse_final/lib triverse_app/lib
          elif [ -d "temp_folder/TriVerse_Final/lib" ]; then
            cp -r temp_folder/TriVerse_Final/lib triverse_app/lib
          else
            cp -r temp_folder/lib triverse_app/lib
          fi

      # 3. Final Build
      - name: Build Final APK
        run: |
          cd triverse_app
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: Upload Verified Premium APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Premium-Final
          path: triverse_app/build/app/outputs/flutter-apk/*.apk
