name: Build TriVerse Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip -o TriVerse_Final.zip

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # Stable modern version

      - name: Create google-services.json
        run: |
          mkdir -p TriVerse_Final/android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > TriVerse_Final/android/app/google-services.json

      - name: Clean and Get Packages
        working-directory: ./TriVerse_Final
        run: |
          flutter clean
          flutter pub get

      - name: Build APK
        working-directory: ./TriVerse_Final
        run: |
          # Ye flag v1 embedding error ko bypass karne ki koshish karega
          flutter build apk --release --no-tree-shake-icons --ignore-deprecation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: triverse-release-apk
          path: "**/build/app/outputs/flutter-apk/app-release.apk"
