name: Build TriVerse Final - Ultra Fix
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Organize Folders & Fix Android V2
        run: |
          # 1. Folders Setup
          mkdir -p lib/services
          mkdir -p android/app/src/main/kotlin/com/example/triverse

          # 2. Files Move karo
          mv main.dart lib/ 2>/dev/null || true
          mv app_state.dart lib/ 2>/dev/null || true
          mv firebase_options.dart lib/ 2>/dev/null || true
          mv *_screen.dart lib/ 2>/dev/null || true
          mv *_hub.dart lib/ 2>/dev/null || true
          mv *_panel.dart lib/ 2>/dev/null || true
          mv support_chat_service.dart lib/services/ 2>/dev/null || true
          mv gemini_service.dart lib/services/ 2>/dev/null || true

          # 3. Android V2 Embedding Fix (Sabse Important)
          # Agar MainActivity.kt bahar hai, toh use sahi package folder mein dalo
          mv MainActivity.kt android/app/src/main/kotlin/com/example/triverse/ 2>/dev/null || true
          mv AndroidManifest.xml android/app/src/main/ 2>/dev/null || true

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # Thoda purana version use karte hain stability ke liye

      - name: Build APK
        run: |
          flutter pub upgrade
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk
