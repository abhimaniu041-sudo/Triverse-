name: Build TriVerse Final APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract ZIP
        run: unzip -o TriVerse_Final.zip

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Restoration & Firebase Setup
        run: |
          # Folder ke andar jao
          cd TriVerse_Final
          
          # Sirf Android structure ko fix karna, original code ko nahi
          # Agar android folder missing hai ya corrupted hai tabhi naya banega
          if [ ! -d "android" ]; then
            flutter create . --platforms android
          fi
          
          # Firebase JSON Setup
          mkdir -p android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          
          # SDK and Package Fix
          sed -i 's/minSdkVersion 19/minSdkVersion 21/g' android/app/build.gradle || true
          
          # Re-sync original code dependencies
          flutter pub get

      - name: Build APK
        run: |
          cd TriVerse_Final
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Original-Premium
          path: 'TriVerse_Final/build/app/outputs/flutter-apk/*.apk'
