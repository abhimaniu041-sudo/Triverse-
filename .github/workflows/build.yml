name: Build TriVerse Final APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract and Rename
        run: |
          unzip -o TriVerse_Final.zip
          mv TriVerse_Final triverse_final || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Total System Overwrite
        run: |
          cd triverse_final
          
          # 1. Design Backup
          cp -r lib lib_permanent_backup
          
          # 2. Fresh Android Structure (Ye sab settings mita deta hai)
          flutter create . --platforms android --overwrite
          
          # 3. Restore ORIGINAL Design
          rm -rf lib
          mv lib_permanent_backup lib
          
          # 4. THE KOTLIN FIX (Directly Overwriting the problematic file)
          # Isse line 1863 wala error hamesha ke liye khatam ho jayenge
          rm -f android/build.gradle
          cat << 'EOF' > android/build.gradle
          buildscript {
              ext.kotlin_version = '1.9.22'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
                  classpath 'com.google.gms:google-services:4.3.15'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF

          # 5. Settings.gradle Fix (Force stable version)
          rm -f android/settings.gradle
          cat << 'EOF' > android/settings.gradle
          include ':app'
          def flutterProjectRoot = rootProject.projectDir.parentFile.toPath()
          def plugins = new Properties()
          def pluginsFile = new File(flutterProjectRoot.toFile(), '.flutter-plugins')
          if (pluginsFile.exists()) {
              pluginsFile.withReader('UTF-8') { reader -> plugins.load(reader) }
          }
          plugins.each { name, path ->
              def pluginDirectory = flutterProjectRoot.resolve(path).resolve('android').toFile()
              include ":$name"
              project(":$name").projectDir = pluginDirectory
          }
          EOF

          # 6. MainActivity Cleanup
          find android/app/src/main -name "MainActivity.*" -delete
          mkdir -p android/app/src/main/kotlin/com/abhimaniu/triverse
          echo 'package com.abhimaniu.triverse
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity() {
          }' > android/app/src/main/kotlin/com/abhimaniu/triverse/MainActivity.kt

          # 7. Firebase & SDK Fix
          mkdir -p android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          sed -i 's/minSdkVersion .*/minSdkVersion 21/g' android/app/build.gradle || true
          
          # 8. Force Dependencies
          flutter pub add firebase_core firebase_auth cloud_firestore firebase_storage cloud_functions google_generative_ai razorpay_flutter fl_chart:0.66.0 provider
          flutter pub get

      - name: Build APK
        run: |
          cd triverse_final
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Premium-Original-Final
          path: 'triverse_final/build/app/outputs/flutter-apk/*.apk'
