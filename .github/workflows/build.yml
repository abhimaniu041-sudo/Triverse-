name: Build TriVerse Final APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract and Rename
        run: |
          unzip -o TriVerse_Final.zip
          mv TriVerse_Final triverse_final || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Version thoda stable aur naya use kar rahe hain mismatch rokne ke liye
          flutter-version: '3.22.0'

      - name: Precision Fixes
        run: |
          cd triverse_final
          
          # 1. Lib backup
          cp -r lib lib_permanent_backup
          
          # 2. Fresh Android Structure
          flutter create . --platforms android --overwrite
          
          # 3. Restore ORIGINAL Design
          rm -rf lib
          mv lib_permanent_backup lib
          
          # 4. Fix Duplicate MainActivity
          find android/app/src/main -name "MainActivity.*" -delete
          mkdir -p android/app/src/main/kotlin/com/abhimaniu/triverse
          echo 'package com.abhimaniu.triverse
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity() {
          }' > android/app/src/main/kotlin/com/abhimaniu/triverse/MainActivity.kt

          # 5. THE FIX: Force specific versions of problematic libraries
          # 'fl_chart' ka version fix kar rahe hain taaki 'Color.a' wala error na aaye
          flutter pub add fl_chart:0.66.0
          flutter pub add firebase_core firebase_auth cloud_firestore google_generative_ai razorpay_flutter

          # 6. Firebase Setup
          mkdir -p android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          
          # 7. SDK Fix
          sed -i 's/minSdkVersion .*/minSdkVersion 21/g' android/app/build.gradle || true
          
          flutter pub get

      - name: Build APK
        run: |
          cd triverse_final
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Premium-Final
          path: 'triverse_final/build/app/outputs/flutter-apk/*.apk'
