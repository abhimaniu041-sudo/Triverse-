name: TriVerse - Final Success Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 🛠️ Force Patch Project & Name
        run: |
          # 1. Pubspec Name Fix (Validating name for Flutter)
          sed -i 's/^name: .*/name: triverse/' pubspec.yaml

          # 2. Structure Fix (Move files if they are scattered)
          mkdir -p lib/services
          mkdir -p android/app/src/main/kotlin/com/example/triverse
          
          mv *.dart lib/ 2>/dev/null || true
          mv lib/support_chat_service.dart lib/services/ 2>/dev/null || true
          mv lib/gemini_service.dart lib/services/ 2>/dev/null || true

          # 3. Android V2 Embedding Force Fix
          # Delete old MainActivity and write a fresh one
          rm -f android/app/src/main/kotlin/com/example/triverse/MainActivity.kt 2>/dev/null || true
          echo "package com.example.triverse
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity() {}" > android/app/src/main/kotlin/com/example/triverse/MainActivity.kt

          # AndroidManifest Patch
          if [ -f AndroidManifest.xml ]; then
            mv AndroidManifest.xml android/app/src/main/ 2>/dev/null || true
          fi
          sed -i 's/android:name="io.flutter.app.FlutterApplication"/android:name="${applicationName}"/g' android/app/src/main/AndroidManifest.xml || true
          
          # Force Add V2 Embedding Meta-data
          if ! grep -q "flutterEmbedding" "android/app/src/main/AndroidManifest.xml"; then
            sed -i '/<application/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml || true
          fi

      - name: ⚙️ Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: 🚀 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: 🏗️ Final Build Effort
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: 📦 Download APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk
