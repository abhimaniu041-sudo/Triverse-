name: Build TriVerse Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract ZIP
        run: unzip -o TriVerse_Final.zip

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Nuclear Fix and Firebase Setup
        run: |
          # Folder structure sahi karna
          mv TriVerse_Final triverse_final || true
          cd triverse_final
          
          # Purana android folder hata kar naya fresh setup karna
          rm -rf android
          flutter create . --platforms android
          
          # Firebase Secret se google-services.json banana
          mkdir -p android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          
          # SDK Version fix karna (minSdkVersion 21)
          sed -i 's/minSdkVersion 19/minSdkVersion 21/g' android/app/build.gradle || true
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle || true

          flutter pub get

      - name: Final Build
        run: |
          cd triverse_final
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Premium-App
          path: 'triverse_final/build/app/outputs/flutter-apk/*.apk'
