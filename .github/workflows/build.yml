name: Build TriVerse APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Extract ZIP
      run: unzip TriVerse_Final.zip
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '11'
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '2.10.5'
    - name: Build APK
      run: |
        PROJECT_DIR=$(find . -name "pubspec.yaml" -exec dirname {} \;)
        cd $PROJECT_DIR
        flutter pub get
        flutter build apk --release --no-sound-null-safety
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: TriVerse-App-Release
        path: '**/*.apk'
