name: Build TriVerse APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Extract ZIP
      run: unzip TriVerse_Final.zip

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'

    - name: Rename and Nuclear Fix
      run: |
        mv TriVerse_Final triverse_final || true
        cd triverse_final
        rm -rf android
        flutter create . --platforms android
        flutter pub get

    - name: Final Build
      run: |
        cd triverse_final
        flutter build apk --release --no-tree-shake-icons

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: TriVerse-App-Release
        path: '**/*.apk'
