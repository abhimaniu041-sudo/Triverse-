name: TriVerse - Final Build Success
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 🛠️ Force Fix Package Name & SDK
        run: |
          # Package name ko 'triverse' (lowercase) set karo
          sed -i 's/^name: .*/name: triverse/' pubspec.yaml
          
          # SDK and Local Properties Fix
          echo 'flutter.minSdkVersion=21' > android/local.properties
          echo 'flutter.targetSdkVersion=34' >> android/local.properties

      - name: ⚙️ Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: 🚀 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: 🏗️ Build APK
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: 📦 Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-App
          path: build/app/outputs/flutter-apk/app-release.apk
