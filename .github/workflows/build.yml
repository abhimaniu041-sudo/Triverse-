name: Build TriVerse APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip -o TriVerse_Final.zip

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          # Agar files folder ke andar hain, toh wahan jao
          if [ -d "TriVerse_Final" ]; then cd TriVerse_Final; fi
          npm install

      - name: Create google-services.json
        run: |
          # Sahi folder mein file banana
          if [ -d "TriVerse_Final" ]; then 
            mkdir -p TriVerse_Final/android/app
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > TriVerse_Final/android/app/google-services.json
          else
            mkdir -p android/app
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android APK
        run: |
          if [ -d "TriVerse_Final" ]; then cd TriVerse_Final; fi
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: triverse-release-apk
          path: "**/android/app/build/outputs/apk/release/app-release.apk"
