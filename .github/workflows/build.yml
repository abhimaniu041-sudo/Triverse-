name: Build TriVerse APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip -o TriVerse_Final.zip

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Create google-services.json
        run: |
          # Sabse pehle jahan-jahan android/app folder hai, wahan file copy kar do
          find . -type d -name "app" | grep "android/app" | while read -r path; do
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > "$path/google-services.json"
            echo "Created json in $path"
          done

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android APK
        run: |
          # Poori directory mein gradlew dhoondo aur wahi se build chalao
          GRADLE_FILE=$(find . -name "gradlew" | head -n 1)
          if [ -z "$GRADLE_FILE" ]; then
            echo "Error: gradlew not found anywhere!"
            exit 1
          fi
          GRADLE_DIR=$(dirname "$GRADLE_FILE")
          echo "Found gradlew in $GRADLE_DIR. Starting build..."
          cd "$GRADLE_DIR"
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: triverse-release-apk
          path: "**/build/outputs/apk/release/*.apk"
