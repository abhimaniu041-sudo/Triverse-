name: Build TriVerse Final Premium

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Hardcode Fix & Build
        run: |
          # 1. Fresh Framework
          flutter create . --platforms android --overwrite --project-name triverse_app
          
          # 2. Extract Premium Code
          unzip -o triverse_final.zip
          
          # 3. Force Version Fix (Direct Injection)
          # Hum direct build.gradle file ke andar version 1.9.10 likh rahe hain
          sed -i "s/ext.kotlin_version = '.*'/ext.kotlin_version = '1.9.10'/g" android/build.gradle
          sed -i 's/kotlin("android") version ".*"/kotlin("android") version "1.9.10"/g' android/settings.gradle || true
          
          # 4. Essential Packages
          flutter pub add provider razorpay_flutter firebase_core firebase_auth cloud_functions

      - name: Compilation
        run: |
          flutter pub get
          # Extra step to ensure Gradle doesn't use old cache
          cd android && ./gradlew clean && cd ..
          flutter build apk --release --no-tree-shake-icons
