name: Build TriVerse Final APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract and Rename
        run: |
          unzip -o TriVerse_Final.zip
          mv TriVerse_Final triverse_final || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Ultimate Restoration
        run: |
          cd triverse_final
          
          # 1. Lib folder backup
          cp -r lib lib_backup
          
          # 2. Fresh Android Structure (No Sed/Bypass)
          flutter create . --platforms android --overwrite
          
          # 3. Restore ORIGINAL Design (Asli code wapas)
          rm -rf lib
          mv lib_backup lib
          
          # 4. MainActivity Fix (Proper Path)
          find android/app/src/main -name "MainActivity.*" -delete
          mkdir -p android/app/src/main/kotlin/com/abhimaniu/triverse
          echo 'package com.abhimaniu.triverse
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity() {
          }' > android/app/src/main/kotlin/com/abhimaniu/triverse/MainActivity.kt

          # 5. Firebase Setup
          mkdir -p android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          
          # 6. Hard-fix minSdkVersion 21 (Razorpay requirement)
          sed -i 's/minSdkVersion .*/minSdkVersion 21/g' android/app/build.gradle || true
          
          # 7. Package Repair (Ye step saare errors khatam karega)
          flutter pub get
          flutter pub upgrade

      - name: Build APK
        run: |
          cd triverse_final
          # Seedha build karenge, koi shortcut nahi
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Premium-Original
          path: 'triverse_final/build/app/outputs/flutter-apk/*.apk'
