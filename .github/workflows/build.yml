name: Build TriVerse Premium APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract & Build Premium
        run: |
          # 1. Sabse pehle framework create karo (Isse demo files banti hain)
          flutter create triverse_app --platforms android --project-name triverse_app
          
          # 2. Extract your REPAIRED ZIP
          unzip -o triverse_final.zip -d temp_folder
          
          # 3. OVERWRITE Demo with YOUR PREMIUM CODE
          # Hum demo folder ko aapke asli code se replace kar rahe hain
          rm -rf triverse_app/lib
          if [ -d "temp_folder/triverse_final/lib" ]; then
            cp -r temp_folder/triverse_final/lib triverse_app/lib
          elif [ -d "temp_folder/TriVerse_Final/lib" ]; then
            cp -r temp_folder/TriVerse_Final/lib triverse_app/lib
          else
            cp -r temp_folder/lib triverse_app/lib
          fi

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Final Compilation
        run: |
          cd triverse_app
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: Upload Premium APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Premium-Final
          path: triverse_app/build/app/outputs/flutter-apk/*.apk
