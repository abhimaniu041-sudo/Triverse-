name: TriVerse Ultimate Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      # 🔥 FULL RESET (NO PATCHING)
      - name: Create Fresh Flutter Project
        run: |
          rm -rf android ios web linux macos windows
          flutter create triverse_temp
          cp -r triverse_temp/android .
          cp -r triverse_temp/pubspec.yaml .
          rm -rf triverse_temp

      # 🔥 FORCE SAFE NAME
      - name: Fix Name
        run: sed -i 's/name: .*/name: triverse/' pubspec.yaml

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: triverse-apk
          path: build/app/outputs/flutter-apk/app-release.apk
