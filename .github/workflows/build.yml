name: TriVerse Final Victory Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Force Fix Project Structure
        run: |
          # 1. Folders Setup
          mkdir -p lib/services
          mkdir -p android/app/src/main/kotlin/com/example/triverse

          # 2. Files ko unki sahi jagah move karo
          mv main.dart lib/ 2>/dev/null || true
          mv app_state.dart lib/ 2>/dev/null || true
          mv firebase_options.dart lib/ 2>/dev/null || true
          mv support_chat_service.dart lib/services/ 2>/dev/null || true
          mv gemini_service.dart lib/services/ 2>/dev/null || true
          mv auth_service.dart lib/services/ 2>/dev/null || true
          mv *_screen.dart lib/ 2>/dev/null || true
          mv *_hub.dart lib/ 2>/dev/null || true
          mv *_panel.dart lib/ 2>/dev/null || true
          mv main_layout.dart lib/ 2>/dev/null || true
          mv payment_service.dart lib/services/ 2>/dev/null || true

          # 3. Android V2 Embedding Fix (Auto-Patch)
          # Purani MainActivity hatao aur nayi dalo
          rm -rf android/app/src/main/kotlin/com/example/triverse/MainActivity.kt
          echo "package com.example.triverse
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity() {}" > android/app/src/main/kotlin/com/example/triverse/MainActivity.kt

          # AndroidManifest Patch
          if [ -f AndroidManifest.xml ]; then
            mv AndroidManifest.xml android/app/src/main/ 2>/dev/null || true
          fi
          sed -i 's/io.flutter.app.FlutterApplication/${applicationName}/g' android/app/src/main/AndroidManifest.xml || true

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # Sabse stable version aapke code ke liye

      - name: Build APK
        run: |
          flutter pub get
          # Purani plugins ko force update karne ke liye
          flutter pub upgrade
          flutter build apk --release --no-tree-shake-icons

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Final-App
          path: build/app/outputs/flutter-apk/app-release.apk
