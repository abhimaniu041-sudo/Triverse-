name: TriVerse Build Clean

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Reset Project
        run: |
          rm -rf android ios web linux macos windows
          flutter create temp_app
          cp -r temp_app/android .
          cp temp_app/pubspec.yaml .
          rm -rf temp_app

      - name: Fix Name
        run: |
          sed -i "s/^name:.*/name: triverse/" pubspec.yaml

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: triverse-apk
          path: build/app/outputs/flutter-apk/app-release.apk
