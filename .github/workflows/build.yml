name: Build TriVerse Final APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract and Rename
        run: |
          unzip -o TriVerse_Final.zip
          mv TriVerse_Final triverse_final || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Nuclear Dependency Injection
        run: |
          cd triverse_final
          
          # 1. Asli design backup
          cp -r lib lib_permanent_backup
          
          # 2. Fresh Android Setup
          flutter create . --platforms android --overwrite
          
          # 3. Restore ORIGINAL Design
          rm -rf lib
          mv lib_permanent_backup lib
          
          # 4. FORCE ADD EVERY MISSING PACKAGE (Screenshot Fix)
          # Isse Firestore aur Gemini ke errors khatam ho jayenge
          flutter pub add firebase_core firebase_auth cloud_firestore google_generative_ai razorpay_flutter cloud_functions
          
          # 5. MainActivity Cleanup
          find android/app/src/main -name "MainActivity.*" -delete
          mkdir -p android/app/src/main/kotlin/com/abhimaniu/triverse
          echo 'package com.abhimaniu.triverse
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity() {
          }' > android/app/src/main/kotlin/com/abhimaniu/triverse/MainActivity.kt

          # 6. Firebase Setup
          mkdir -p android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          
          # 7. SDK Fix
          sed -i 's/minSdkVersion .*/minSdkVersion 21/g' android/app/build.gradle || true
          
          flutter pub get

      - name: Build APK
        run: |
          cd triverse_final
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Premium-Original-App
          path: 'triverse_final/build/app/outputs/flutter-apk/*.apk'
