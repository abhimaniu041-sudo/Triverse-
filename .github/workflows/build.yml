name: Build TriVerse Final APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract ZIP
        run: |
          unzip -o TriVerse_Final.zip
          # Folder ka naam badal kar lowercase kar rahe hain taaki Flutter gussa na ho
          mv TriVerse_Final triverse_final || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Fix Embedding & Firebase
        run: |
          cd triverse_final
          
          # 1. Force modern Android structure (No Overwrite to protect your code)
          flutter create . --platforms android
          
          # 2. Modern MainActivity Fix (v2 embedding)
          FILE_PATH=$(find . -name "MainActivity.kt" -print -quit)
          if [ -z "$FILE_PATH" ]; then
            FILE_PATH=$(find . -name "MainActivity.java" -print -quit)
          fi
          
          echo "Updating MainActivity at $FILE_PATH"
          echo 'package com.abhimaniu.triverse

          import io.flutter.embedding.android.FlutterActivity

          class MainActivity: FlutterActivity() {
          }' > "$FILE_PATH"

          # 3. Firebase Setup
          mkdir -p android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          
          # 4. Version and Dependencies
          sed -i 's/minSdkVersion 19/minSdkVersion 21/g' android/app/build.gradle || true
          flutter pub get

      - name: Build APK
        run: |
          cd triverse_final
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Premium-Final
          path: 'triverse_final/build/app/outputs/flutter-apk/*.apk'
