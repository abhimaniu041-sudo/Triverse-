name: Build TriVerse Final

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Manual Force Repair
        run: |
          # 1. Clean Slate
          flutter create . --platforms android --overwrite --project-name triverse_app
          rm -rf lib/*
          
          # 2. Inject Real Code
          unzip -o triverse_final.zip
          find . -type d -name "lib" -exec cp -r {}/. lib/ \;
          
          # 3. FORCE SETTINGS.GRADLE (The real fix for Kotlin error)
          cat <<EOF > android/settings.gradle
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  return properties.getProperty("flutter.sdk")
              }()
              includeBuild("\$flutterSdkPath/packages/flutter_tools/gradle")
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          plugins {
              id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
              id "com.android.application" version "8.1.0" apply false
              id "org.jetbrains.kotlin.android" version "1.9.24" apply false
          }
          include ":app"
          EOF

          # 4. Fix Build.gradle
          sed -i "s/ext.kotlin_version = .*/ext.kotlin_version = '1.9.24'/g" android/build.gradle || true

          # 5. Fix Cloud Functions version conflict
          flutter pub add cloud_functions:5.1.0 razorpay_flutter firebase_core firebase_auth provider

      - name: Build APK
        run: |
          flutter pub get
          cd android && ./gradlew clean && cd ..
          flutter build apk --release --no-tree-shake-icons

      - name: Upload Verified APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Pro-Build
          path: build/app/outputs/flutter-apk/*.apk
