name: Build TriVerse Final Premium

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Restore & Repair Project
        run: |
          # 1. Fresh Framework
          flutter create . --platforms android --overwrite --project-name triverse_app
          
          # 2. Extract Premium Code
          unzip -o triverse_final.zip
          
          # 3. FIX GRADLE (The precise way)
          # Hum sirf Kotlin version update karenge, poori file replace nahi karenge
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.10"/g' android/build.gradle || true
          
          # 4. Add Essential Packages
          flutter pub add provider razorpay_flutter firebase_core firebase_auth cloud_functions

      - name: Final Compilation
        run: |
          flutter pub get
          # Fixing a common Gradle mismatch on the fly
          cd android
          ./gradlew clean || true
          cd ..
          flutter build apk --release --no-tree-shake-icons
