name: Build TriVerse Final APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract and Rename
        run: |
          unzip -o TriVerse_Final.zip
          mv TriVerse_Final triverse_final || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Fix Embedding & Restore Original Code
        run: |
          cd triverse_final
          
          # 1. Tumhare asli code ka backup lo
          cp -r lib lib_backup
          cp -r assets assets_backup || true
          
          # 2. Modern Android structure setup karo (Isse embedding fix hogi)
          flutter create . --platforms android --overwrite
          
          # 3. Demo code ko hatao aur asli premium code wapas dalo
          rm -rf lib
          mv lib_backup lib
          if [ -d "assets_backup" ]; then
            rm -rf assets
            mv assets_backup assets
          fi
          
          # 4. Modern MainActivity Fix (v2 embedding)
          FILE_PATH=$(find . -name "MainActivity.kt" -print -quit)
          echo 'package com.abhimaniu.triverse
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity() {
          }' > "$FILE_PATH"

          # 5. Firebase Setup
          mkdir -p android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          
          # 6. SDK Fix (minSdkVersion 21)
          sed -i 's/minSdkVersion .*/minSdkVersion 21/g' android/app/build.gradle || true
          
          flutter pub get

      - name: Build APK
        run: |
          cd triverse_final
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Premium-Final-Working
          path: 'triverse_final/build/app/outputs/flutter-apk/*.apk'
