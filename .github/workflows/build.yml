name: Build TriVerse Final APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract and Rename
        run: |
          unzip -o TriVerse_Final.zip
          mv TriVerse_Final triverse_final || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Total Crash Protection Fix
        run: |
          cd triverse_final
          
          # 1. Fresh Android Setup
          flutter create . --platforms android --overwrite
          
          # 2. DELETE DEMO & RESTORE PREMIUM (Anti-Demo Fix)
          rm -rf lib
          rm -f pubspec.yaml
          unzip -o ../TriVerse_Final.zip
          mv TriVerse_Final/lib lib
          mv TriVerse_Final/pubspec.yaml pubspec.yaml
          
          # 3. CRITICAL: Bypass Firebase Initialization Crash
          # Hum code ko force kar rahe hain ki agar Firebase na mile toh crash na ho
          sed -i 's/Firebase.initializeApp()/try { await Firebase.initializeApp(); } catch (e) { print(e); }/g' lib/main.dart || true
          
          # 4. Force Inject google-services.json (Fixes 'Keeps Stopping')
          mkdir -p android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          
          # 5. MainActivity Cleanup (com.abhimaniu.triverse)
          find android/app/src/main -name "MainActivity.*" -delete
          mkdir -p android/app/src/main/kotlin/com/abhimaniu/triverse
          echo 'package com.abhimaniu.triverse
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity() {
          }' > android/app/src/main/kotlin/com/abhimaniu/triverse/MainActivity.kt

          # 6. SDK Version Lock (Safe for all phones)
          sed -i 's/minSdkVersion .*/minSdkVersion 21/g' android/app/build.gradle || true
          
          # 7. Final Package Sync
          flutter pub add firebase_core firebase_auth cloud_firestore firebase_storage cloud_functions google_generative_ai razorpay_flutter fl_chart:0.68.0 provider
          flutter pub get

      - name: Build APK (Release)
        run: |
          cd triverse_final
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Premium-Final-Working
          path: 'triverse_final/build/app/outputs/flutter-apk/*.apk'
