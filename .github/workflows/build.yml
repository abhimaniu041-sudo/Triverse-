name: Build TriVerse Final APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract and Rename
        run: |
          unzip -o TriVerse_Final.zip
          mv TriVerse_Final triverse_final || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Clean & Force Dependencies
        run: |
          cd triverse_final
          
          # 1. Purani files hatao taaki fresh start ho
          rm -rf android
          rm -f pubspec.lock
          
          # 2. Fresh Android Structure (Embedding fix)
          flutter create . --platforms android --overwrite
          
          # 3. Modern MainActivity Fix (Direct Path)
          find android/app/src/main -name "MainActivity.*" -delete
          mkdir -p android/app/src/main/kotlin/com/abhimaniu/triverse
          echo 'package com.abhimaniu.triverse
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity() {
          }' > android/app/src/main/kotlin/com/abhimaniu/triverse/MainActivity.kt

          # 4. Firebase Setup
          mkdir -p android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          
          # 5. SDK Fix (minSdkVersion 21)
          sed -i 's/minSdkVersion .*/minSdkVersion 21/g' android/app/build.gradle || true
          
          # 6. FORCE RE-INSTALL LIBRARIES
          # In commands se compiler ko Razorpay aur Firebase mil jayenge
          flutter pub get
          flutter pub upgrade

      - name: Build APK
        run: |
          cd triverse_final
          # Asli premium code build karenge
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Premium-Final
          path: 'triverse_final/build/app/outputs/flutter-apk/*.apk'
