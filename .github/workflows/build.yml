name: Build TriVerse Final APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract & Clean Name
        run: |
          unzip -o TriVerse_Final.zip
          # Sabse bada fix: Naam se '-' hata kar 'triverse_app' kar diya
          mkdir triverse_app
          if [ -d "TriVerse_Final/TriVerse_Final" ]; then
            cp -r TriVerse_Final/TriVerse_Final/* triverse_app/
          elif [ -d "TriVerse_Final" ]; then
            cp -r TriVerse_Final/* triverse_app/
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Source Code Repair
        run: |
          cd triverse_app
          # 1. Fresh Framework with Valid Name
          flutter create . --platforms android --overwrite --project-name triverse_app
          
          # 2. Crash Buster (Rewriting main.dart)
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'screens/home_dashboard.dart';

          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            runApp(const MaterialApp(
              debugShowCheckedModeBanner: false,
              home: HomeDashboard(),
            ));
          }
          EOF

          # 3. Global UI Fix (MainLayout remover)
          find lib/ -name "*.dart" -exec sed -i 's/MainLayout.of(context)?.switchTab/print/g' {} + || true
          find lib/ -name "*.dart" -exec sed -i 's/MainLayout.of(context)/context/g' {} + || true

          # 4. MainActivity Setup (com.abhimaniu.triverse)
          find android/app/src/main -name "MainActivity.*" -delete
          mkdir -p android/app/src/main/kotlin/com/abhimaniu/triverse
          echo 'package com.abhimaniu.triverse
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity() {
          }' > android/app/src/main/kotlin/com/abhimaniu/triverse/MainActivity.kt

          # 5. SDK & Firebase Sync
          mkdir -p android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          sed -i 's/minSdkVersion .*/minSdkVersion 21/g' android/app/build.gradle || true
          
          flutter pub get

      - name: Build APK (Release Mode)
        run: |
          cd triverse_app
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Final-Success
          path: 'triverse_app/build/app/outputs/flutter-apk/*.apk'
