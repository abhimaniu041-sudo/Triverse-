name: Build TriVerse Final APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract and Rename
        run: |
          unzip -o TriVerse_Final.zip
          mv TriVerse_Final triverse_final || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Force Original Code Only
        run: |
          cd triverse_final
          
          # 1. Pubspec ko overwrite hone se roko
          flutter pub get
          
          # 2. Android folder fix (Bina pura project mitaaye)
          # Hum sirf wo files inject karenge jo build ko 'com.abhimaniu.triverse' dikhayein
          mkdir -p android/app/src/main/kotlin/com/abhimaniu/triverse
          echo 'package com.abhimaniu.triverse
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity() {
          }' > android/app/src/main/kotlin/com/abhimaniu/triverse/MainActivity.kt

          # 3. Firebase Config
          mkdir -p android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          
          # 4. Final SDK Check
          sed -i 's/minSdkVersion .*/minSdkVersion 21/g' android/app/build.gradle || true

      - name: Build APK (The Real One)
        run: |
          cd triverse_final
          # Is baar hum --no-clean use karenge taaki files safe rahein
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Premium-Original-App
          path: 'triverse_final/build/app/outputs/flutter-apk/*.apk'
