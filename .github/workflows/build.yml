name: Build TriVerse Final Premium

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Hard Force Gradle & Kotlin
        run: |
          # 1. Framework Fresh Start
          flutter create . --platforms android --overwrite --project-name triverse_app
          
          # 2. Force Update Gradle Wrapper (The 8.0 Fix)
          cd android
          sed -i 's/gradle-7.6.3-all.zip/gradle-8.0-all.zip/g' gradle/wrapper/gradle-wrapper.properties
          cd ..

          # 3. Extract Premium Code
          unzip -o triverse_final.zip
          
          # 4. Final Settings Fix
          cat <<EOF > android/settings.gradle
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  return flutterSdkPath
              }()
              includeBuild("\$flutterSdkPath/packages/flutter_tools/gradle")
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          plugins {
              id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
              id "com.android.application" version "8.1.0" apply false
              id "org.jetbrains.kotlin.android" version "1.9.10" apply false
          }
          include ":app"
          EOF

          # 5. Packages
          flutter pub add provider razorpay_flutter firebase_core firebase_auth cloud_functions

      - name: Final Compilation
        run: |
          flutter pub get
          cd android && ./gradlew clean && cd ..
          flutter build apk --release --no-tree-shake-icons
