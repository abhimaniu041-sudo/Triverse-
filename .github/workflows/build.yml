name: Build TriVerse Final Premium

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Latest Flutter (The Fix)
        uses: subosito/flutter-action@v2
        with:
          # Flutter version ko 3.24.0 par shift kar rahe hain
          flutter-version: '3.24.0'

      - name: Force Framework & Inject Code
        run: |
          # 1. Framework create karo (Is baar naye version ke saath)
          flutter create . --platforms android --overwrite --project-name triverse_app
          
          # 2. ZIP Extract karo
          unzip -o triverse_final.zip
          
          # 3. Kotlin Version Direct Injection
          # Naye Flutter ke liye hum 1.9.22 use karenge jo stable hai
          sed -i "s/ext.kotlin_version = '.*'/ext.kotlin_version = '1.9.22'/g" android/build.gradle || true
          
          # 4. Essential Packages
          flutter pub add provider razorpay_flutter firebase_core firebase_auth cloud_functions

      - name: Compilation
        run: |
          flutter pub get
          cd android && ./gradlew clean && cd ..
          flutter build apk --release --no-tree-shake-icons
