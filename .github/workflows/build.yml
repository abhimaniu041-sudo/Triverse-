name: Build TriVerse Final Premium

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Fast Inject & Kotlin Fix
        run: |
          # 1. Framework create karo
          flutter create . --platforms android --overwrite --project-name triverse_app
          
          # 2. ZIP Extract karo
          unzip -o triverse_final.zip
          
          # 3. KOTLIN FORCE UPDATE (Sabse important step)
          # Ye line android folder ki build.gradle mein jaakar version update kar degi
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.0"/g' android/build.gradle || true
          
          # 4. Essential Libraries add karo
          flutter pub add provider razorpay_flutter firebase_core firebase_auth cloud_functions

      - name: Speed Build APK
        run: |
          flutter pub get
          # Fast mode: parallel processing on
          flutter build apk --release --no-tree-shake-icons --split-per-abi

      - name: Upload Premium APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Premium-Final
          path: build/app/outputs/flutter-apk/*.apk
