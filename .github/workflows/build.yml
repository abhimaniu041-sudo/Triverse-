name: Build TriVerse Final APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract and Rename
        run: |
          unzip -o TriVerse_Final.zip
          mv TriVerse_Final triverse_final || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Manual Force Restoration
        run: |
          cd triverse_final
          
          # 1. Asli Premium code ka backup lo (Manual copy)
          cp -r lib lib_permanent_backup
          cp pubspec.yaml pubspec_permanent_backup.yaml
          
          # 2. Modern Android setup
          flutter create . --platforms android --overwrite
          
          # 3. THE FIX: Demo code delete karo aur backup se asli code restore karo
          # Isse demo page kabhi nahi aa sakta
          rm -rf lib
          cp -r lib_permanent_backup lib
          cp pubspec_permanent_backup.yaml pubspec.yaml
          
          # 4. MainActivity Cleanup
          find android/app/src/main -name "MainActivity.*" -delete
          mkdir -p android/app/src/main/kotlin/com/abhimaniu/triverse
          echo 'package com.abhimaniu.triverse
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity() {
          }' > android/app/src/main/kotlin/com/abhimaniu/triverse/MainActivity.kt

          # 5. Firebase Setup
          mkdir -p android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          
          # 6. Version Fix
          sed -i 's/minSdkVersion .*/minSdkVersion 21/g' android/app/build.gradle || true
          
          # 7. Get dependencies
          flutter pub get

      - name: Build APK
        run: |
          cd triverse_final
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Premium-Original-App
          path: 'triverse_final/build/app/outputs/flutter-apk/*.apk'
