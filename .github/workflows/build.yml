name: Build TriVerse Final APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Repaired ZIP
        run: |
          # Sabse safe tarika: Kisi bhi zip file ko dhoondo
          unzip -o *.zip
          
          # Folder structure fix (Small letters ke liye)
          if [ -d "triverse_final" ]; then
            cp -r triverse_final/* . || true
          elif [ -d "TriVerse_Final" ]; then
            cp -r TriVerse_Final/* . || true
          fi

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Build Execution
        run: |
          # Naming conflict khatam karne ke liye project name specify kiya
          flutter create . --platforms android --overwrite --project-name triverse_app
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Small-Name-Success
          path: build/app/outputs/flutter-apk/*.apk
