name: Build TriVerse Final Premium

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Manual Kotlin & Gradle Fix
        run: |
          # 1. Framework create karo
          flutter create . --platforms android --overwrite --project-name triverse_app
          
          # 2. Kotlin version ko manually overwrite karo (Hardcoded fix)
          cat <<EOF > android/build.gradle
          buildscript {
              ext.kotlin_version = '1.9.0'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:\$kotlin_version"
                  classpath 'com.google.gms:google-services:4.3.15'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

          # 3. ZIP Extract karo
          unzip -o triverse_final.zip
          
          # 4. Essential Libraries add karo
          flutter pub add provider razorpay_flutter firebase_core firebase_auth cloud_functions

      - name: Final Build
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
