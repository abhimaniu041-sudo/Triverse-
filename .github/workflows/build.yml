name: Build TriVerse Premium APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Inject Premium Code & Fix Dependencies
        run: |
          # 1. Framework create karo
          flutter create triverse_app --platforms android --project-name triverse_app
          
          # 2. Extract your zip
          unzip -o triverse_final.zip -d temp_folder
          
          # 3. Replace lib folder (Aapka Premium Code)
          rm -rf triverse_app/lib
          if [ -d "temp_folder/triverse_final/lib" ]; then
            cp -r temp_folder/triverse_final/lib triverse_app/lib
          elif [ -d "temp_folder/TriVerse_Final/lib" ]; then
            cp -r temp_folder/TriVerse_Final/lib triverse_app/lib
          else
            cp -r temp_folder/lib triverse_app/lib
          fi

          # 4. FORCE ADD MISSING LIBRARIES (Error log ke hisaab se)
          cd triverse_app
          flutter pub add razorpay_flutter firebase_core firebase_auth cloud_functions provider fl_chart:0.68.0

      - name: Build Final APK
        run: |
          cd triverse_app
          flutter pub get
          # Fixing potential small errors in code on the fly
          find lib/ -name "*.dart" -exec sed -i 's/PaymentSuccessResponse/dynamic/g' {} + || true
          find lib/ -name "*.dart" -exec sed -i 's/PaymentFailureResponse/dynamic/g' {} + || true
          
          flutter build apk --release --no-tree-shake-icons

      - name: Upload Verified Premium APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Premium-Final
          path: triverse_app/build/app/outputs/flutter-apk/*.apk
