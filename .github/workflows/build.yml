name: Build TriVerse Final APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract and Rename
        run: |
          unzip -o TriVerse_Final.zip
          mv TriVerse_Final triverse_final || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Anti-Crash & Firebase Fix
        run: |
          cd triverse_final
          
          # 1. Backup lib and assets
          cp -r lib lib_backup
          cp -r assets assets_backup || true
          
          # 2. Fresh Android Structure
          flutter create . --platforms android --overwrite
          
          # 3. Restore Premium Design
          rm -rf lib
          mv lib_backup lib
          if [ -d "assets_backup" ]; then
            rm -rf assets
            mv assets_backup assets
          fi
          
          # 4. MainActivity Fix (Proper Path)
          find android/app/src/main -name "MainActivity.*" -delete
          mkdir -p android/app/src/main/kotlin/com/abhimaniu/triverse
          echo 'package com.abhimaniu.triverse
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity() {
          }' > android/app/src/main/kotlin/com/abhimaniu/triverse/MainActivity.kt

          # 5. THE CRASH FIX: Google Services placement
          mkdir -p android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          # Force copy to gradle location
          cp android/app/google-services.json android/app/src/google-services.json || true
          
          # 6. Package Name Sync (Important for Firebase)
          sed -i 's/com.example.triverse_final/com.abhimaniu.triverse/g' android/app/build.gradle || true

          # 7. SDK Fix (minSdkVersion 21)
          sed -i 's/minSdkVersion .*/minSdkVersion 21/g' android/app/build.gradle || true
          
          flutter pub get

      - name: Build APK
        run: |
          cd triverse_final
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Premium-Fixed-Final
          path: 'triverse_final/build/app/outputs/flutter-apk/*.apk'
