name: Build TriVerse APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Extract ZIP
      run: unzip TriVerse_Final.zip

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'

    - name: Migrate to V2 Embedding
      run: |
        PROJECT_DIR=$(find . -name "pubspec.yaml" -exec dirname {} \;)
        cd $PROJECT_DIR
        # Purani files hatane ke liye
        rm -rf android/app/src/main/java/io/flutter/app/FlutterApplication.java || true
        # AndroidManifest ko naye format mein update karne ke liye
        find android -name "AndroidManifest.xml" -exec sed -i 's/android:name="io.flutter.app.FlutterApplication"/android:name="${applicationName}"/g' {} +
        # MainActivity ko naye format mein force-fix karne ke liye
        flutter create . --platforms android
        flutter pub get

    - name: Build APK
      run: |
        PROJECT_DIR=$(find . -name "pubspec.yaml" -exec dirname {} \;)
        cd $PROJECT_DIR
        flutter build apk --release --no-tree-shake-icons

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: TriVerse-App-Release
        path: '**/*.apk'
