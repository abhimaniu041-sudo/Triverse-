name: Build TriVerse Final APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract and Rename
        run: |
          unzip -o TriVerse_Final.zip
          mv TriVerse_Final triverse_final || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Surgical V2 Migration & Fix
        run: |
          cd triverse_final
          
          # 1. Force V2 Embedding (Fixes Line 196 in screenshot)
          # Hum sirf android folder ko refresh karenge bina lib/main.dart ko touch kiye
          flutter create . --platforms android --overwrite
          
          # 2. Re-Restore Original lib (Just in case flutter create touched it)
          # Isse demo page ka naam-o-nishaan mit jayega
          unzip -o ../TriVerse_Final.zip
          mv TriVerse_Final/* . || true
          
          # 3. MainActivity Cleanup (V2 format)
          find android/app/src/main -name "MainActivity.*" -delete
          mkdir -p android/app/src/main/kotlin/com/abhimaniu/triverse
          echo 'package com.abhimaniu.triverse
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity() {
          }' > android/app/src/main/kotlin/com/abhimaniu/triverse/MainActivity.kt

          # 4. Firebase Config
          mkdir -p android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          
          # 5. SDK Fix
          sed -i 's/minSdkVersion .*/minSdkVersion 21/g' android/app/build.gradle || true
          
          # 6. Fresh Packages
          flutter pub get

      - name: Build APK (The Real One)
        run: |
          cd triverse_final
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Premium-Original-App
          path: 'triverse_final/build/app/outputs/flutter-apk/*.apk'
