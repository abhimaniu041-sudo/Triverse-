name: Build TriVerse Final APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract and Rename
        run: |
          unzip -o TriVerse_Final.zip
          mv TriVerse_Final triverse_final || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Manual Android Setup (Safe Mode)
        run: |
          cd triverse_final
          
          # 1. Sabse bada fix: Flutter create nahi chalayenge taaki lib folder safe rahe
          # Sirf missing android folder setup karenge (agar zarurat padi toh)
          flutter pub get
          
          # 2. MainActivity ko manually overwrite karenge (v2 embedding)
          # Isse "audioplayers" wala error solve ho jayega
          find . -name "MainActivity.kt" -exec sh -c 'echo "package com.abhimaniu.triverse\n\nimport io.flutter.embedding.android.FlutterActivity\n\nclass MainActivity: FlutterActivity() {\n}" > {}' \;

          # 3. Firebase Setup
          # Kyunki humne flutter create nahi kiya, humein manually check karna hai
          mkdir -p android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          
          # 4. Version Fix (Directly in gradle)
          find . -name "build.gradle" -exec sed -i "s/minSdkVersion .*/minSdkVersion 21/g" {} +

      - name: Build APK
        run: |
          cd triverse_final
          # --no-pub use karenge taaki build process mein koi file change na ho
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Original-Code-Final
          path: 'triverse_final/build/app/outputs/flutter-apk/*.apk'
