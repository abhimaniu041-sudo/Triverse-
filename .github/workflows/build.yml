name: Build TriVerse Final

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Force Inject TriVerse Code
        run: |
          # 1. Fresh Framework
          flutter create . --platforms android --overwrite --project-name triverse_app
          
          # 2. DELETE DEMO CONTENT
          rm -rf lib/*
          
          # 3. Extract TriVerse Real Code
          unzip -o triverse_final.zip
          
          # 4. Critical: Ensure code is in the right place
          # Agar zip ke andar 'lib' folder hai, toh hum use main directory mein laa rahe hain
          if [ -d "triverse_final/lib" ]; then
            cp -r triverse_final/lib/* lib/
          elif [ -d "TriVerse_Final/lib" ]; then
            cp -r TriVerse_Final/lib/* lib/
          fi

          # 5. Fix Android Gradle & Kotlin (For the last time!)
          sed -i 's/gradle-7.6.3-all.zip/gradle-8.0-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties || true
          
      - name: Build TriVerse APK
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: Upload TriVerse APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Verified-APK
          path: build/app/outputs/flutter-apk/*.apk
