name: Build TriVerse Final

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Prepare & Build
        run: |
          flutter create . --platforms android --overwrite --project-name triverse_app
          unzip -o triverse_final.zip || true
          
          # Kotlin/Gradle Fixes
          sed -i 's/gradle-7.6.3-all.zip/gradle-8.0-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties || true
          
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-App-Package
          # Ye path ab har tarah ki APK ko pakad lega
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
