name: Build TriVerse Final APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract and Rename
        run: |
          unzip -o TriVerse_Final.zip
          mv TriVerse_Final triverse_final || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: THE FINAL OVERWRITE (Anti-Demo Fix)
        run: |
          cd triverse_final
          
          # 1. Android settings fix (Isse demo page ban jayega, par hum ise mita denge)
          flutter create . --platforms android --overwrite
          
          # 2. THE NUCLEAR STEP: Demo page ko jadd se mitao
          # Hum 'lib' folder aur 'pubspec.yaml' ko poora uda rahe hain
          rm -rf lib
          rm -f pubspec.yaml
          
          # 3. Asli Code Restore (ZIP se fresh copy)
          unzip -o ../TriVerse_Final.zip
          mv TriVerse_Final/lib lib
          mv TriVerse_Final/pubspec.yaml pubspec.yaml
          
          # 4. MainActivity Fix (com.abhimaniu.triverse)
          find android/app/src/main -name "MainActivity.*" -delete
          mkdir -p android/app/src/main/kotlin/com/abhimaniu/triverse
          echo 'package com.abhimaniu.triverse
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity() {
          }' > android/app/src/main/kotlin/com/abhimaniu/triverse/MainActivity.kt

          # 5. Firebase & SDK Lock
          mkdir -p android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          sed -i 's/minSdkVersion .*/minSdkVersion 21/g' android/app/build.gradle || true
          
          # 6. Fresh Packages
          flutter pub get

      - name: Build APK (The Real Premium One)
        run: |
          cd triverse_final
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Premium-Final-Success
          path: 'triverse_final/build/app/outputs/flutter-apk/*.apk'
