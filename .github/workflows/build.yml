name: Build TriVerse APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Extract Project
        run: unzip -o TriVerse_Final.zip -d project

      # 🔥 IMPORTANT FIX
      - name: Fix Android V2
        run: |
          cd project/TriVerse_Final
          flutter create . --platforms android --overwrite

      - name: Get Dependencies
        run: |
          cd project/TriVerse_Final
          flutter pub get

      - name: Build APK
        run: |
          cd project/TriVerse_Final
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: triverse-apk
          path: project/TriVerse_Final/build/app/outputs/flutter-apk/app-release.apk
