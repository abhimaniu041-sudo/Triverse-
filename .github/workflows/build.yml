name: Build TriVerse Final APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract and Rename
        run: |
          unzip -o TriVerse_Final.zip
          mv TriVerse_Final triverse_final || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Final Force Fix
        run: |
          cd triverse_final
          
          # 1. Code Backup
          cp -r lib lib_backup
          
          # 2. Modern Android Structure
          flutter create . --platforms android --overwrite
          
          # 3. Restore Premium Design
          rm -rf lib
          mv lib_backup lib
          
          # 4. Modern MainActivity Fix
          FILE_PATH=$(find . -name "MainActivity.kt" -print -quit)
          echo 'package com.abhimaniu.triverse
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity() {
          }' > "$FILE_PATH"

          # 5. Firebase Setup
          mkdir -p android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          
          # 6. Force SDK Version 21 (Hard Link)
          sed -i 's/minSdkVersion .*/minSdkVersion 21/g' android/app/build.gradle || true

          # 7. THE FIX: Force Refresh Packages
          rm -f pubspec.lock
          flutter pub get
          flutter pub upgrade --major-versions

      - name: Build APK
        run: |
          cd triverse_final
          # Is baar build ke waqt pub get phir se chalayenge
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TriVerse-Premium-Original
          path: 'triverse_final/build/app/outputs/flutter-apk/*.apk'
