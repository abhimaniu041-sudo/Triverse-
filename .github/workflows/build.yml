name: Build TriVerse APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Extract ZIP
      run: unzip TriVerse_Final.zip
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
    - name: Clean and Fix
      run: |
        cd TriVerse_Final
        flutter clean
        find . -name "AndroidManifest.xml" -exec sed -i 's/android:name="io.flutter.app.FlutterApplication"/android:name="${applicationName}"/g' {} + || true
    - name: Build APK
      run: |
        cd TriVerse_Final
        flutter pub get
        flutter build apk --release --no-tree-shake-icons --no-pub
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: TriVerse-App-Release
        path: '**/*.apk'
