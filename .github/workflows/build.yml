- name: Build Android APK
        run: |
          # Pehle gradlew file ko dhoondo aur uske folder mein jao
          GRADLE_PATH=$(find . -name gradlew -print -quit)
          GRADLE_DIR=$(dirname "$GRADLE_PATH")
          cd "$GRADLE_DIR"
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: triverse-release-apk
          path: "**/build/outputs/apk/release/app-release.apk"
