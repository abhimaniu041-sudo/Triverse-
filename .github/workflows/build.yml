name: Debug Folder Structure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip -o TriVerse_Final.zip

      - name: List all folders
        run: |
          echo "--- Root Directory Content ---"
          ls -F
          echo "--- Searching for package.json ---"
          find . -name "package.json"
